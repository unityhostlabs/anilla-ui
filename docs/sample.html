<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>AnillaUI UMD Example</title>

        <!-- Load the UMD bundle — exposes window.AnillaUI -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script type="module" src="scripts.js"></script>

        <style>
            #my-modal {
                display: none;
            }
            #my-modal.is-open {
                display: block;
            }

            #my-menu {
                display: none;
            }
            #my-menu.is-open {
                display: block;
            }
        </style>
    </head>
    <body class="p-6">
        <!-- Modal trigger -->
        <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mr-6" data-ui-toggle="my-modal">Open Modal</button>

        <!-- Modal -->
        <div id="my-modal">
            <h2>Hello from AnillaUI!</h2>
            <button data-ui-toggle="my-modal">Close</button>
        </div>

        <!-- Dropdown trigger -->
        <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded" id="menu-btn">
            Menu ▾
        </button>

        <!-- Dropdown panel -->
        <ul class="border bg-white rounded-lg max-w-96" id="my-menu" data-ui-dropdown="true" data-dropdown-trigger="#menu-btn" data-dropdown-transition-enter="transition-all duration-300 ease-out" data-dropdown-transition-leave="duration-200 ease-in" data-dropdown-transition-enter-from="opacity-0 scale-95" data-dropdown-transition-enter-to="opacity-100 scale-100" data-dropdown-transition-leave-from="opacity-100 scale-100" data-dropdown-transition-leave-to="opacity-0 scale-95">
            <li><button type="button" class="block w-full px-4 py-2 hover:bg-blue-300">Item 1</button></li>
            <li><button type="button" class="block w-full px-4 py-2 hover:bg-blue-300">Item 2</button></li>
            <li><button type="button" class="block w-full px-4 py-2 hover:bg-blue-300">Item 3</button></li>
            <li><button type="button" class="block w-full px-4 py-2 hover:bg-blue-300">Item 4</button></li>
            <li><button type="button" class="block w-full px-4 py-2 hover:bg-blue-300">Item 5</button></li>
        </ul>
        <div class="transition-all duration-300 ease-out duration-200 ease-in opacity-0 scale-95 opacity-100 scale-100">dummy</div>
