<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../demos.css">
    <script>
        // Set initial theme to prevent FOUC
        const storageKey = 'buttons-theme-demo';
        const savedTheme = localStorage.getItem(storageKey);
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <script type="module">
        import { Theme } from '../../src/components/Theme.js';

        const theme = new Theme('html', {
            trigger: '[theme-trigger]',
            storageKey: storageKey
        });
    </script>
</head>
<body>
    <div class="flex flex-col justify-center h-screen p-4">
        <div class="flex items-center justify-center gap-6 w-full max-w-lg mx-auto">
            <button type="button" class="btn btn-default group" data-mode="light" theme-trigger>
                <span class="hidden group-aria-pressed:inline mr-1">&#8594; </span>
                Light
            </button>
            <button type="button" class="btn btn-default group" data-mode="dark" theme-trigger>
                <span class="hidden group-aria-pressed:inline mr-1">&#8594; </span>
                Dark
            </button>
            <a href="#" class="btn btn-default group" data-mode="auto" theme-trigger>
                <span class="hidden group-aria-pressed:inline mr-1">&#8594; </span>
                Auto
            </a>
        </div>
    </div>
</body>
</html>
