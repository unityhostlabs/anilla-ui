<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../demos.css">
    <script type="module">
        import { Theme } from '../../src/components/Theme.js';

        const theme = new Theme('html', {
            trigger: '[theme-trigger]',
            storageKey: 'session-storage-theme',
            storageType: 'session'
        });
    </script>
</head>
<body>
    <div class="flex flex-col justify-center h-screen p-4">
        <div class="flex items-center justify-center gap-6 w-full max-w-lg mx-auto">
            <label class="form-label">
                <input class="form-switch" type="checkbox" role="switch" theme-trigger>
            </label>
        </div>
    </div>
</body>
</html>
