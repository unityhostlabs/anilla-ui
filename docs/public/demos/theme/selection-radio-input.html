<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../demos.css">
    <script>
        // Set initial theme to prevent FOUC
        const storageKey = 'radio-theme-demo';
        const savedTheme = localStorage.getItem(storageKey);
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <script type="module">
        import { Theme } from '../../src/components/Theme.js';

        const theme = new Theme('html', {
            trigger: '[theme-trigger]',
            storageKey: storageKey,
            // onChange: ({ instance }) => {
            //     console.log(instance);
            // }
        });

        // theme.on('change', ({ instance }) => {
        //     console.log(instance);
        // });

        // document.documentElement.addEventListener('ui:change', (e) => {
        //     const { instance } = e.detail;
        //     console.log(instance);
        // });
    </script>
</head>
<body>
    <div class="flex flex-col justify-center h-screen p-4">
        <div class="flex items-center justify-center gap-6 w-full max-w-lg mx-auto">
            <label class="form-label">
                <input class="form-radio" type="radio" name="themeRadio" value="light" theme-trigger>
                Light
            </label>
            <label class="form-label">
                <input class="form-radio" type="radio" name="themeRadio" value="dark" theme-trigger>
                Dark
            </label>
            <label class="form-label">
                <input class="form-radio" type="radio" name="themeRadio" value="auto" theme-trigger>
                Auto
            </label>
        </div>
    </div>
</body>
</html>
