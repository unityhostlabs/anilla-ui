<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../demos.css">
    <script>
        // Set initial theme to prevent FOUC
        const storageKey = 'select-theme-demo';
        const savedTheme = localStorage.getItem(storageKey);
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <script type="module">
        import { Theme } from '../../src/components/Theme.js';

        const theme = new Theme('html', {
            trigger: '[theme-trigger]',
            storageKey: storageKey
        });
    </script>
</head>
<body>
    <div class="flex flex-col justify-center h-screen p-4">
        <div class="flex items-center justify-center gap-6 w-full max-w-lg mx-auto">
            <select class="form-input" title="Select theme" theme-trigger>
                <option value="light" title="Select light theme">Light</option>
                <option value="dark">Dark</option>
                <option value="auto">Auto</option>
            </select>
        </div>
    </div>
</body>
</html>
